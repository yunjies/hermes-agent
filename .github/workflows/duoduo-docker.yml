name: Duoduo Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - codex/duoduo-feishu-image
    paths:
      - Dockerfile
      - pyproject.toml
      - uv.lock
      - gateway/**
      - plugins/**
      - tests/gateway/**
      - .github/workflows/duoduo-docker.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: duoduo-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/yunjies/hermes-agent
  STABLE_TAG: duoduo-v0.17.0-feishu

jobs:
  build-test-push-amd64:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:duoduo-smoke
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=duoduo-docker-amd64
          cache-to: type=gha,mode=max,scope=duoduo-docker-amd64

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /opt/hermes/.venv/bin/hermes \
            "${IMAGE_NAME}:duoduo-smoke" --version | tee /tmp/hermes-version.txt
          grep -q "Hermes Agent v0.17.0" /tmp/hermes-version.txt
          docker run --rm --entrypoint /opt/hermes/.venv/bin/python \
            "${IMAGE_NAME}:duoduo-smoke" \
            -c 'import lark_oapi, qrcode; print("feishu deps ok")'
          docker run --rm --entrypoint sh "${IMAGE_NAME}:duoduo-smoke" \
            -lc 'grep -R "multiplex_profiles" /opt/hermes/gateway/config.py /opt/hermes/gateway/run.py >/dev/null'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.STABLE_TAG }}
            ${{ env.IMAGE_NAME }}:duoduo-feishu-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/yunjies/hermes-agent
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=duoduo-docker-amd64
          cache-to: type=gha,mode=max,scope=duoduo-docker-amd64
